version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ls_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: light_and_shadow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ls_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  auth-server:
    build:
      context: .
      dockerfile: Dockerfile.auth
    container_name: ls_auth
    restart: always
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - POSTGRES_DSN=postgres://postgres:postgrespassword@postgres:5432/light_and_shadow?sslmode=disable
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - LOG_LEVEL=info
    depends_on:
      - postgres
      - redis

  world-server:
    build:
      context: .
      dockerfile: Dockerfile.world
    container_name: ls_world
    restart: always
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - POSTGRES_DSN=postgres://postgres:postgrespassword@postgres:5432/light_and_shadow?sslmode=disable
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - LOG_LEVEL=info
    depends_on:
      - postgres
      - redis

  gateway-server:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: ls_gateway
    restart: always
    ports:
      - "8080:8080"   # Porta TCP de entrada dos clientes
      - "9080:9080"   # Porta HTTP de Health Check do gateway (8080 + 1000)
    environment:
      - GATEWAY_PORT=8080
      - AUTH_PORT=8081
      - WORLD_PORT=8082
      - POSTGRES_DSN=postgres://postgres:postgrespassword@postgres:5432/light_and_shadow?sslmode=disable
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - LOG_LEVEL=info
    depends_on:
      - postgres
      - redis
      - auth-server
      - world-server

volumes:
  pgdata:
  redisdata:
